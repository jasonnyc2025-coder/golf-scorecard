<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#166534" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="高尔夫记分" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="description" content="高尔夫记分卡 - 18洞记分，历史记录" />

  <title>高尔夫记分卡</title>

  <!-- PWA Icons -->
  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="manifest" href="manifest.json" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow-x: hidden; }
    body {
      background: #F0F4F0;
      font-family: 'Inter', -apple-system, sans-serif;
      color: #1E293B;
      -webkit-tap-highlight-color: transparent;
      -webkit-font-smoothing: antialiased;
    }
    #app { max-width: 540px; margin: 0 auto; padding: 0 0 100px 0; min-height: 100vh; background: #F0F4F0; }

    /* Safe area for iPhone notch */
    .header { padding-top: max(20px, env(safe-area-inset-top, 20px)); }

    /* Header */
    .header {
      background: linear-gradient(135deg, #166534 0%, #15803D 60%, #22C55E 100%);
      padding-bottom: 16px;
      padding-left: 20px;
      padding-right: 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .header::before { content: '⛳'; position: absolute; font-size: 120px; opacity: 0.07; right: -20px; top: -10px; }
    .header-logo { font-size: 52px; line-height: 1; margin-bottom: 6px; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.25)); }
    .header-sub { font-size: 11px; color: rgba(255,255,255,0.7); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 6px; }
    .header-title { font-family: 'Noto Serif SC', serif; font-size: 26px; font-weight: 900; color: #fff; letter-spacing: 1px; }
    .menu-fab { position: absolute; top: max(10px, env(safe-area-inset-top, 10px)); right: 14px; background: rgba(255,255,255,0.2); border: 1.5px solid rgba(255,255,255,0.4); color: #fff; border-radius: 50%; width: 36px; height: 36px; font-size: 22px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; letter-spacing: -1px; line-height: 1; }
    .menu-fab:active { background: rgba(255,255,255,0.35); }
    .menu-backdrop { position: fixed; inset: 0; z-index: 90; }
    .menu-dropdown { position: absolute; top: max(52px, calc(env(safe-area-inset-top, 0px) + 52px)); right: 10px; background: #fff; border-radius: 14px; box-shadow: 0 8px 32px rgba(0,0,0,0.18); z-index: 100; min-width: 190px; overflow: hidden; }
    .menu-item { display: block; width: 100%; padding: 15px 18px; border: none; background: none; font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 500; color: #1E293B; text-align: left; cursor: pointer; border-bottom: 1px solid #F1F5F9; }
    .menu-item:last-child { border-bottom: none; }
    .menu-item:active { background: #F8FAFC; }

    /* Tabs */
    .tabs { display: flex; margin: 16px 8px 0; background: #fff; border-radius: 12px; padding: 4px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .tab-btn { flex: 1; padding: 10px 0; background: none; border: none; color: #94A3B8; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; border-radius: 9px; transition: all 0.2s; }
    .tab-btn.active { background: #166534; color: #fff; box-shadow: 0 2px 8px rgba(22,101,52,0.25); }

    /* Stat bar */
    .stat-bar { display: flex; gap: 8px; padding: 14px 8px; }
    .stat-chip { flex: 1; background: #fff; border-radius: 12px; padding: 12px 6px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.06); border: 1px solid #E2E8F0; }
    .stat-val { font-family: 'Noto Serif SC', serif; font-size: 30px; font-weight: 700; line-height: 1; }
    .stat-lbl { font-size: 16px; color: #94A3B8; letter-spacing: 0.5px; margin-top: 5px; }

    /* Total banner */
    .total-banner { margin: 0 8px 14px; background: #fff; border-radius: 16px; padding: 18px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 12px rgba(0,0,0,0.07); border: 1px solid #E2E8F0; }
    .total-label { font-size: 11px; color: #94A3B8; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
    .total-score { font-family: 'Noto Serif SC', serif; font-size: 44px; font-weight: 900; color: #16A34A; line-height: 1; }
    .total-score.over { color: #DC2626; }
    .total-score.even { color: #64748B; }
    .progress-text { font-size: 12px; color: #94A3B8; margin-top: 6px; }
    .strokes-val { font-family: 'Noto Serif SC', serif; font-size: 30px; font-weight: 700; color: #1E293B; line-height: 1; }
    .strokes-lbl { font-size: 15px; color: #94A3B8; text-align: right; margin-top: 4px; }

    /* Holes grid */
    .holes-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; padding: 0 7px; }
    .hole-card { border-radius: 14px; overflow: hidden; transition: all 0.15s; box-shadow: 0 2px 8px rgba(0,0,0,0.13); }
    .hole-hdr { display: flex; align-items: center; justify-content: center; padding: 8px 4px; position: relative; }
    .hole-num { font-size: 20px; font-weight: 900; letter-spacing: 0.2px; }
    .clear-hole-btn { position: absolute; right: 3px; top: 50%; transform: translateY(-50%); background: none; border: none; font-size: 14px; cursor: pointer; padding: 0 2px; opacity: 0.7; line-height: 1; }
    .clear-hole-btn:active { opacity: 1; }
    .hole-body { padding: 8px 6px 10px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .adj-btn { width: 100%; height: 30px; border-radius: 8px; border: 2px solid rgba(0,0,0,0.1); background: rgba(255,255,255,0.82); color: #1E293B; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.1s; font-weight: 500; box-shadow: 0 1px 4px rgba(0,0,0,0.1); line-height: 1; }
    .adj-btn:active { transform: scale(0.95); background: #fff; }
    .adj-btn:disabled { opacity: 0.2; cursor: not-allowed; }
    .hole-score { font-family: 'Noto Serif SC', serif; font-size: 32px; font-weight: 900; text-align: center; line-height: 1; width: 100%; }
    .dash { color: #94A3B8; font-size: 26px; }
    .score-label { font-size: 14px; text-align: center; font-weight: 700; letter-spacing: 0.2px; width: 100%; }
    .par-btn { width: 100%; padding: 6px 0; border-radius: 8px; border: 1.5px solid #94A3B8; background: rgba(255,255,255,0.6); color: #64748B; font-size: 13px; font-weight: 600; cursor: pointer; letter-spacing: 1px; transition: all 0.1s; }
    .par-btn:active { background: #E2E8F0; }

    /* Bottom buttons */
    .finish-wrap { padding: 16px 8px 0; display: flex; gap: 8px; }
    .finish-btn { flex: 1; padding: 16px; border-radius: 14px; border: none; font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s; background: #166534; color: #fff; box-shadow: 0 4px 16px rgba(22,101,52,0.3); }
    .finish-btn:disabled { background: #E2E8F0; color: #94A3B8; box-shadow: none; }
    .finish-btn:active:not(:disabled) { transform: scale(0.98); }
    .reset-btn { padding: 16px 18px; border-radius: 14px; border: 1.5px solid #E2E8F0; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; background: #fff; color: #94A3B8; transition: all 0.15s; }
    .reset-btn:active { background: #FEE2E2; color: #DC2626; border-color: #FCA5A5; }

    /* Confirm dialog */
    .confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .confirm-box { background: #fff; border-radius: 20px; padding: 28px 24px; width: 100%; max-width: 320px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); text-align: center; }
    .confirm-icon { font-size: 36px; margin-bottom: 12px; }
    .confirm-title { font-family: 'Noto Serif SC', serif; font-size: 18px; font-weight: 700; color: #1E293B; margin-bottom: 8px; }
    .confirm-desc { font-size: 13px; color: #94A3B8; margin-bottom: 24px; line-height: 1.5; }
    .confirm-btns { display: flex; gap: 10px; }
    .confirm-cancel { flex: 1; padding: 13px; border-radius: 12px; border: 1.5px solid #E2E8F0; background: #fff; color: #64748B; font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; }
    .confirm-ok { flex: 1; padding: 13px; border-radius: 12px; border: none; background: #DC2626; color: #fff; font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; }

    /* History */
    .history-list { padding: 0 16px; margin-top: 16px; }
    .history-empty { text-align: center; color: #94A3B8; padding: 60px 20px; font-size: 14px; line-height: 2; }
    .history-card { background: #fff; border: 1px solid #E2E8F0; border-radius: 16px; padding: 16px; margin-bottom: 12px; position: relative; box-shadow: 0 1px 6px rgba(0,0,0,0.05); }
    .hc-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .hc-date { font-size: 12px; color: #94A3B8; margin-bottom: 4px; }
    .hc-strokes { font-family: 'Noto Serif SC', serif; font-size: 34px; font-weight: 900; color: #1E293B; line-height: 1; }
    .hc-strokes-lbl { font-size: 11px; color: #94A3B8; margin-top: 2px; }
    .hc-badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .hc-stats { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .hc-holes { display: flex; flex-wrap: wrap; gap: 4px; }
    .hc-dot { width: 26px; height: 26px; border-radius: 6px; font-size: 9px; display: flex; align-items: center; justify-content: center; font-weight: 700; }
    .del-btn { position: absolute; top: 12px; right: 12px; background: #F1F5F9; border: none; color: #94A3B8; cursor: pointer; font-size: 14px; width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    .del-btn:active { background: #FEE2E2; color: #DC2626; }

    /* Toast */
    .toast { position: fixed; top: max(24px, env(safe-area-inset-top, 24px)); left: 50%; transform: translateX(-50%); background: #166534; color: #fff; padding: 12px 28px; border-radius: 30px; font-size: 14px; font-weight: 500; z-index: 999; box-shadow: 0 4px 20px rgba(22,101,52,0.4); animation: toastIn 0.3s ease; white-space: nowrap; }
    @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(-10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

    /* Install banner */
    .install-banner { margin: 12px 8px 0; background: #EFF6FF; border: 1px solid #BFDBFE; border-radius: 12px; padding: 12px 14px; display: flex; align-items: center; gap: 10px; font-size: 12px; color: #1D4ED8; }
    .install-banner-close { margin-left: auto; background: none; border: none; color: #93C5FD; font-size: 16px; cursor: pointer; padding: 0 4px; }
  </style>
</head>
<body>
<div id="app"></div>

<script>
// ── Data ──────────────────────────────────────────────────────────────
const PAR = 72, HOLES = 18;
const SCORE_LABELS = {
  "-3": { label: "信天翁", color: "#B45309" },
  "-2": { label: "老鹰",   color: "#D97706" },
  "-1": { label: "小鸟",   color: "#16A34A" },
  "0":  { label: "平标准", color: "#64748B" },
  "1":  { label: "博忌",   color: "#DC2626" },
  "2":  { label: "双博忌", color: "#B91C1C" },
  "3":  { label: "三博忌", color: "#991B1B" },
};
function scoreStyle(val) {
  if (val === null) return { bg: "#CBD5E1", color: "#64748B", border: "2px solid #94A3B8", hdrBg: "#64748B",  hdrColor: "#fff" };
  if (val <= -2)    return { bg: "#FCD34D", color: "#78350F", border: "2px solid #F59E0B", hdrBg: "#B45309",  hdrColor: "#fff" };
  if (val === -1)   return { bg: "#4ADE80", color: "#14532D", border: "2px solid #16A34A", hdrBg: "#15803D",  hdrColor: "#fff" };
  if (val === 0)    return { bg: "#93C5FD", color: "#1E3A8A", border: "2px solid #3B82F6", hdrBg: "#1D4ED8",  hdrColor: "#fff" };
  if (val === 1)    return { bg: "#FCA5A5", color: "#7F1D1D", border: "2px solid #EF4444", hdrBg: "#DC2626",  hdrColor: "#fff" };
  return               { bg: "#EF4444", color: "#fff",     border: "2px solid #DC2626", hdrBg: "#991B1B",  hdrColor: "#fff" };
}

// ── IndexedDB ─────────────────────────────────────────────────────────
const DB_NAME = 'golf_scorecard', DB_VER = 1, STORE = 'history';
function openDB() {
  return new Promise((res, rej) => {
    const r = indexedDB.open(DB_NAME, DB_VER);
    r.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE))
        db.createObjectStore(STORE, { keyPath: 'id' });
    };
    r.onsuccess = e => res(e.target.result);
    r.onerror   = e => rej(e.target.error);
  });
}
function dbGetAll() {
  return openDB().then(db => new Promise((res, rej) => {
    const r = db.transaction(STORE,'readonly').objectStore(STORE).getAll();
    r.onsuccess = e => res(e.target.result.sort((a,b) => b.id - a.id));
    r.onerror   = e => rej(e.target.error);
  }));
}
function dbAdd(rec) {
  return openDB().then(db => new Promise((res, rej) => {
    const r = db.transaction(STORE,'readwrite').objectStore(STORE).put(rec);
    r.onsuccess = () => res();
    r.onerror   = e => rej(e.target.error);
  }));
}
function dbDelete(id) {
  return openDB().then(db => new Promise((res, rej) => {
    const r = db.transaction(STORE,'readwrite').objectStore(STORE).delete(id);
    r.onsuccess = () => res();
    r.onerror   = e => rej(e.target.error);
  }));
}

// ── State ─────────────────────────────────────────────────────────────
let scores   = Array(HOLES).fill(null);
let history  = [];
let tab      = "card";
let showConfirm = false;
let showMenu    = false;
let toastTimer  = null;
let showInstall = true;
let deferredPrompt = null;

// 当前轮次草稿存取（localStorage，小数据用它即可）
const DRAFT_KEY = "golf_draft";
function saveDraft() {
  try { localStorage.setItem(DRAFT_KEY, JSON.stringify(scores)); } catch {}
}
function loadDraft() {
  try {
    const d = localStorage.getItem(DRAFT_KEY);
    if (d) scores = JSON.parse(d);
  } catch {}
}
function clearDraft() {
  try { localStorage.removeItem(DRAFT_KEY); } catch {}
}

// 初始化：恢复草稿 + 从 IndexedDB 加载历史
async function initDB() {
  loadDraft(); // 先恢复未完成的轮次
  try {
    const old = localStorage.getItem("golf_pwa_v1");
    if (old) {
      const records = JSON.parse(old);
      for (const r of records) await dbAdd(r);
      localStorage.removeItem("golf_pwa_v1");
    }
  } catch {}
  history = await dbGetAll();
  render();
}
initDB();

// ── PWA install prompt ────────────────────────────────────────────────
window.addEventListener("beforeinstallprompt", e => {
  e.preventDefault();
  deferredPrompt = e;
  showInstall = true;
  render();
});
window.addEventListener("appinstalled", () => {
  deferredPrompt = null;
  showInstall = false;
  render();
});

// ── Actions ───────────────────────────────────────────────────────────
function setScore(hole, val) {
  scores[hole - 1] = val;
  saveDraft();
  render();
}
function clearHole(hole) {
  scores[hole - 1] = null;
  saveDraft();
  render();
}
async function finish() {
  const total = scores.reduce((a,b)=>a+(b??0),0);
  const rec = {
    id: Date.now(),
    date: new Date().toLocaleDateString("zh-CN",{year:"numeric",month:"2-digit",day:"2-digit",weekday:"short"}),
    scores: [...scores], total,
    totalStrokes: total + PAR,
    birdies: scores.filter(s=>s===-1).length,
    eagles:  scores.filter(s=>s<=-2).length,
    bogeys:  scores.filter(s=>s>=1).length,
  };
  await dbAdd(rec);
  history = [rec, ...history];
  scores = Array(HOLES).fill(null);
  clearDraft();
  tab = "history";
  showToast("✅ 已保存到历史记录");
  render();
}
async function deleteRecord(id) {
  await dbDelete(id);
  history = history.filter(r => r.id !== id);
  render();
}
// ── 备份 / 恢复 ───────────────────────────────────────────────────────
function exportData() {
  const payload = JSON.stringify({ version: 1, exportedAt: new Date().toISOString(), history }, null, 2);
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([payload], { type: 'application/json' }));
  a.download = `高尔夫记录_${new Date().toLocaleDateString('zh-CN').replace(/\//g,'-')}.json`;
  a.click();
  showToast('📁 备份已保存到下载文件夹');
}
function importData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = async e => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const data = JSON.parse(await file.text());
      const records = Array.isArray(data) ? data : (data.history || []);
      if (!records.length) throw new Error();
      const existingIds = new Set(history.map(r => r.id));
      let added = 0;
      for (const r of records) {
        if (!existingIds.has(r.id)) { await dbAdd(r); added++; }
      }
      history = await dbGetAll();
      render();
      showToast(`✅ 已恢复 ${added} 条记录`);
    } catch { showToast('❌ 文件格式有误，恢复失败'); }
  };
  input.click();
}

function showToast(msg) {
  clearTimeout(toastTimer);
  const el = document.getElementById("toast");
  if (el) { el.textContent = msg; el.style.display = "block"; }
  toastTimer = setTimeout(() => { const e = document.getElementById("toast"); if(e) e.style.display="none"; }, 2200);
}
async function triggerInstall() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  if (outcome === "accepted") { deferredPrompt = null; showInstall = false; }
  render();
}
function hideInstall() {
  showInstall = false;
  localStorage.setItem("golf_hide_install","1");
  render();
}

// ── Render ────────────────────────────────────────────────────────────
function render() {
  const filled = scores.filter(s=>s!==null).length;
  const total  = scores.reduce((a,b)=>a+(b??0),0);
  const strokes = total + PAR;
  const allDone = filled === HOLES;
  const birds  = scores.filter(s=>s===-1).length;
  const eagles = scores.filter(s=>s<=-2).length;
  const bogeys = scores.filter(s=>s>=1).length;
  const pars   = scores.filter(s=>s===0).length;

  // holes grid
  let holesHtml = "";
  for (let i=0; i<HOLES; i++) {
    const h = i+1, v = scores[i];
    const st = scoreStyle(v);
    const lbl = v!==null ? SCORE_LABELS[String(v)] : null;
    const scoreText = v===null ? `<span class="dash">–</span>` : (v>0?`+${v}`:v);
    holesHtml += `
      <div class="hole-card" style="background:${st.bg}">
        <div class="hole-hdr" style="background:${st.hdrBg}">
          <span class="hole-num" style="color:${st.hdrColor}">第${h}洞</span>
          ${v!==null ? `<button class="clear-hole-btn" onclick="clearHole(${h})" style="color:${st.hdrColor}">×</button>` : ""}
        </div>
        <div class="hole-body">
          <button class="adj-btn" onclick="setScore(${h},${(v??0)+1})" ${v!==null&&v>=4?"disabled":""}>+</button>
          ${v===null
            ? `<button class="par-btn" onclick="setScore(${h},0)">平</button>`
            : `<div class="hole-score" style="color:${st.color}">${scoreText}</div>`
          }
          <button class="adj-btn" onclick="setScore(${h},${(v??0)-1})" ${v!==null&&v<=-3?"disabled":""}>−</button>
          <div class="score-label" style="color:${lbl?lbl.color:"#94A3B8"}">${lbl?lbl.label:"未记录"}</div>
        </div>
      </div>`;
  }

  // history cards
  let histHtml = "";
  if (history.length === 0) {
    histHtml = `<div class="history-empty"><div style="font-size:48px;margin-bottom:12px">⛳</div>暂无历史记录<br/>完成一轮后将显示在这里</div>`;
  } else {
    history.forEach(r => {
      const dc = r.total<0?"#16A34A":r.total>0?"#DC2626":"#64748B";
      const dt = r.total===0?"E":r.total>0?`+${r.total}`:String(r.total);
      let dots = r.scores.map((s,i)=>{
        const st=scoreStyle(s);
        const t=s===null?"–":s===0?"E":s>0?`+${s}`:s;
        return `<div class="hc-dot" style="background:${st.bg};color:${st.color};border:${st.border}">${t}</div>`;
      }).join("");
      histHtml += `
        <div class="history-card">
          <button class="del-btn" onclick="deleteRecord(${r.id})">×</button>
          <div class="hc-top">
            <div>
              <div class="hc-date">${r.date}</div>
              <div class="hc-strokes">${r.totalStrokes}</div>
              <div class="hc-strokes-lbl">总杆数</div>
            </div>
            <div style="text-align:right;padding-right:32px">
              <div style="font-family:'Noto Serif SC',serif;font-size:26px;font-weight:900;color:${dc};line-height:1">${dt}</div>
              <div style="font-size:11px;color:#94A3B8;margin-top:4px">与标准杆</div>
            </div>
          </div>
          <div class="hc-stats">
            ${r.eagles>0?`<span class="hc-badge" style="background:#FEF3C7;color:#D97706">🦅 老鹰 ×${r.eagles}</span>`:""}
            ${r.birdies>0?`<span class="hc-badge" style="background:#DCFCE7;color:#16A34A">🐦 小鸟 ×${r.birdies}</span>`:""}
            ${r.bogeys>0?`<span class="hc-badge" style="background:#FEE2E2;color:#DC2626">博忌 ×${r.bogeys}</span>`:""}
          </div>
          <div class="hc-holes">${dots}</div>
        </div>`;
    });
  }

  const totalClass = total>0?"over":total===0?"even":"";
  const totalText  = total===0?"E":total>0?`+${total}`:total;

  // install banner: show if PWA not installed and prompt available or iOS
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isInStandalone = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone;
  const showBanner = showInstall && !isInStandalone && (deferredPrompt || isIOS);
  const bannerHtml = showBanner ? `
    <div class="install-banner">
      <span>📲</span>
      <span>${isIOS ? "点击 <b>分享</b> → <b>添加到主屏幕</b> 即可安装" : "点击安装到手机主屏幕"}</span>
      ${!isIOS && deferredPrompt ? `<button onclick="triggerInstall()" style="background:#1D4ED8;color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap">安装</button>` : ""}
      <button class="install-banner-close" onclick="hideInstall()">×</button>
    </div>` : "";

  document.getElementById("app").innerHTML = `
    <div id="toast" class="toast" style="display:none"></div>

    ${showConfirm ? `
    <div class="confirm-overlay">
      <div class="confirm-box">
        <div class="confirm-icon">🔄</div>
        <div class="confirm-title">重置本轮？</div>
        <div class="confirm-desc">所有 18 洞的记录将被清除，此操作不可恢复。</div>
        <div class="confirm-btns">
          <button class="confirm-cancel" onclick="showConfirm=false;render()">取消</button>
          <button class="confirm-ok" onclick="scores=Array(${HOLES}).fill(null);clearDraft();showConfirm=false;render()">确认重置</button>
        </div>
      </div>
    </div>` : ""}

    <div class="header">
      <div class="header-logo">⛳</div>
      <div class="header-sub">Golf Scorecard</div>
      <div class="header-title">高尔夫记分卡</div>
      <button class="menu-fab" onclick="showMenu=!showMenu;render()">⋮</button>
      ${showMenu ? `
      <div class="menu-backdrop" onclick="showMenu=false;render()"></div>
      <div class="menu-dropdown">
        ${deferredPrompt && !isInStandalone ? `<button class="menu-item" onclick="showMenu=false;triggerInstall()">📲 安装APP</button>` : ""}
        <button class="menu-item" onclick="showMenu=false;render();exportData()">📥 导出备份到手机</button>
        <button class="menu-item" onclick="showMenu=false;render();importData()">📤 从备份恢复</button>
      </div>` : ""}
    </div>

    ${bannerHtml}

    <div class="tabs">
      <button class="tab-btn ${tab==="card"?"active":""}" onclick="tab='card';render()">📋 记分</button>
      <button class="tab-btn ${tab==="history"?"active":""}" onclick="tab='history';render()">📁 历史记录${history.length>0?` (${history.length})`:""}</button>
    </div>

    ${tab==="card" ? `
      <div class="stat-bar">
        <div class="stat-chip"><div class="stat-val" style="color:#D97706">${eagles}</div><div class="stat-lbl">🦅 老鹰</div></div>
        <div class="stat-chip"><div class="stat-val" style="color:#16A34A">${birds}</div><div class="stat-lbl">🐦 小鸟</div></div>
        <div class="stat-chip"><div class="stat-val" style="color:#64748B">${pars}</div><div class="stat-lbl">— 平标</div></div>
        <div class="stat-chip"><div class="stat-val" style="color:#DC2626">${bogeys}</div><div class="stat-lbl">博忌+</div></div>
      </div>
      <div class="total-banner">
        <div>
          <div class="total-label">与标准杆</div>
          <div class="total-score ${totalClass}">${totalText}</div>
          <div class="progress-text">${filled} / 18 洞已记录</div>
        </div>
        <div style="text-align:right">
          <div class="strokes-val">${filled>0?strokes:"—"}</div>
          <div class="strokes-lbl">总杆数</div>
        </div>
      </div>
      <div class="holes-grid">${holesHtml}</div>
      <div class="finish-wrap">
        <button class="finish-btn" ${allDone?"":"disabled"} onclick="finish()">
          ${allDone?"✓ 完成本轮，保存记录":`还剩 ${HOLES-filled} 洞未记录`}
        </button>
        ${filled>0?`<button class="reset-btn" onclick="showConfirm=true;render()">重置</button>`:""}
      </div>
    ` : `
      <div class="history-list">${histHtml}</div>
    `}
  `;

  // restore toast if visible
  if (toastTimer) {
    const el = document.getElementById("toast");
    if (el && el.textContent) el.style.display = "block";
  }
}

render();
</script>

<!-- Service Worker registration + update detection -->
<script>
if ("serviceWorker" in navigator) {
  let waitingWorker = null;

  // 显示更新提示条
  function showUpdateBar() {
    if (document.getElementById("sw-update-bar")) return;
    const bar = document.createElement("div");
    bar.id = "sw-update-bar";
    bar.style.cssText = "position:fixed;bottom:80px;left:50%;transform:translateX(-50%);" +
      "background:#166534;color:#fff;padding:12px 20px;border-radius:30px;font-size:14px;" +
      "font-weight:500;z-index:999;display:flex;align-items:center;gap:12px;" +
      "box-shadow:0 4px 24px rgba(0,0,0,0.22);white-space:nowrap;";
    bar.innerHTML = '🆕 发现新版本 ' +
      '<button onclick="applyUpdate()" style="background:rgba(255,255,255,0.22);' +
      'border:1.5px solid rgba(255,255,255,0.5);color:#fff;border-radius:20px;' +
      'padding:5px 14px;font-size:13px;font-weight:700;cursor:pointer;">立即更新</button>';
    document.body.appendChild(bar);
  }

  window.applyUpdate = function () {
    if (waitingWorker) waitingWorker.postMessage("skipWaiting");
  };

  // 新 SW 激活后自动刷新页面
  navigator.serviceWorker.addEventListener("controllerchange", () => {
    window.location.reload();
  });

  navigator.serviceWorker.register("sw.js").then(reg => {
    // 每次加载检查是否有新版本
    reg.update();

    reg.addEventListener("updatefound", () => {
      const newWorker = reg.installing;
      newWorker.addEventListener("statechange", () => {
        if (newWorker.state === "installed" && navigator.serviceWorker.controller) {
          // 有新 SW 等待 → 显示更新条
          waitingWorker = newWorker;
          showUpdateBar();
        }
      });
    });

    // 首次加载时若已有 waiting 的 SW，也提示
    if (reg.waiting && navigator.serviceWorker.controller) {
      waitingWorker = reg.waiting;
      showUpdateBar();
    }
  }).catch(() => {});
}
</script>
